<div class="app-list-container">
    <button class="app-list-show-button" (click)="toggleAppList()" [class.active]="isAppListVisible()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
    </button>
    
    @if (isAppListVisible()) {
        <div class="app-list">
            @for (app of connectedApps(); track app.id) {
                <div class="app-item" [class]="'app-' + app.platform">
                    <button class="disconnect-btn" (click)="disconnectAccount(app.id)" aria-label="Disconnect">×</button>
                    <!-- Display an icon based on platform -->
                    @if (app.platform === 'messenger') {
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    } @else if (app.platform === 'instagram') {
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x2="6.5"></line></svg>
                    }
                </div>
            }
        </div>

        <button class="app-add-button" (click)="toggleAddCard()">
            <p>+</p>
        </button>

        @if (isAddCardVisible()) {
            <div class="add-app-card overlay">
                <div class="card-content">
                    <h3>Connect new app</h3>
                    <button type="button" class="connect-btn messenger" [disabled]="isConnecting()" (click)="connectPlatform('messenger'); toggleAddCard()">
                        Connect Messenger
                    </button>
                    <button type="button" class="connect-btn instagram" [disabled]="isConnecting()" (click)="connectPlatform('instagram'); toggleAddCard()">
                        Connect Instagram
                    </button>
                    <button type="button" class="cancel-btn" (click)="toggleAddCard()">Cancel</button>
                </div>
            </div>
        }
    }
</div>
